name = "marketing-harness"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "marketing-harness"
database_id = "YOUR_DATABASE_ID_HERE"

[vars]
# ALERT_WEBHOOK_URL = "https://your-webhook-endpoint.example.com"  # set via wrangler secret put

[triggers]
crons = ["*/5 * * * *", "0 2 * * *"]
